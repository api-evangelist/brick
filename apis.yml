description: >-
  BRICK is an open-source community-driven ontology standard for standardizing
  semantic descriptions of physical, logical, and virtual assets in buildings
  and the relationships between them. Using Semantic Web (RDF/OWL) technology,
  BRICK v1.4.4 enables interoperability across building management systems,
  reducing the cost of deploying analytics and energy efficiency initiatives.
  It supports HVAC, lighting, fire, security, and other building subsystems
  under a unified extensible vocabulary with SHACL-based validation.
