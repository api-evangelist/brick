        type: Documentation
      - url: https://ontology.brickschema.org/
        type: OntologyBrowser
      - url: https://github.com/BrickSchema/Brick
        type: GitHubRepository
    description: >-
      The BRICK ontology v1.4.4 defines a standardized vocabulary of building
      system concepts, relationships, and data model for smart building analytics.
      Available as RDF/OWL files, BRICK describes sensors, equipment, locations,
      and control points in HVAC, lighting, fire safety, and security systems.
      Includes SHACL shapes for ontology validation and Python tooling via
      the brickschema Python package.
